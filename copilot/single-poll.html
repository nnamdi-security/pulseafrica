<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PulseAfrica | Poll</title>
  <link rel="stylesheet" href="single-poll.css">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700&family=Inter:wght@400;600&family=Space+Mono&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Poll Header -->
  <header class="poll-header">
    <h1>Presidential Approval Rating</h1>
    <p>Share your opinion on the President’s performance.</p>
    <div class="progress">
      <div class="progress-bar" id="progressBar"></div>
    </div>
  </header>

  <!-- Poll Form -->
  <main class="poll-form" id="pollForm">
    <!-- Question -->
    <div class="question active">
      <h2>How do you rate the President’s performance?</h2>
      <div class="options">
        <button class="option">Strongly Approve</button>
        <button class="option">Approve</button>
        <button class="option">Neutral</button>
        <button class="option">Disapprove</button>
        <button class="option">Strongly Disapprove</button>
      </div>
    </div>

    <!-- Demographics -->
    <div class="question">
      <h2>Tell us about yourself</h2>
      <label>Age Range
        <select>
          <option>18-24</option>
          <option>25-34</option>
          <option>35-44</option>
          <option>45-54</option>
          <option>55+</option>
        </select>
      </label>
      <label>Gender
        <select>
          <option>Male</option>
          <option>Female</option>
          <option>Other</option>
        </select>
      </label>
      <label>State
        <input type="text" placeholder="Enter your state">
      </label>
      <label>Occupation
        <input type="text" placeholder="Enter your occupation">
      </label>
      <label>Education Level
        <select>
          <option>Primary</option>
          <option>Secondary</option>
          <option>Tertiary</option>
          <option>Postgraduate</option>
        </select>
      </label>
    </div>

    <!-- Submit -->
    <div class="question">
      <h2>Submit Your Response</h2>
      <button id="submitPoll" class="cta">Submit</button>
    </div>
  </main>

  <!-- Thank You Screen -->
  <section class="thank-you" id="thankYou">
    <h2>Thank You!</h2>
    <p>Your response has been recorded. Explore results to see how others feel.</p>
    <a href="results.html" class="cta">View Results</a>
  </section>

  <script src="single-poll.js"></script>
</body>
</html>
